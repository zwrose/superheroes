name: CI

on:
  push:
    branches: [main]
  pull_request:
    # include `edited` so the pr-title check re-validates when the title is fixed
    # (a re-run replays the stale event payload; only a new event refreshes the title)
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate marketplace + plugin manifests
        run: python3 .github/scripts/validate_marketplace.py

      - name: Catalog membership / metadata.version consistency
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          python3 .github/scripts/check_catalog_membership.py "origin/$GITHUB_BASE_REF"

      - name: Validate dual-host manifests + tool maps
        run: python3 .github/scripts/validate_hosts.py

      - name: Validate skill token-shape
        run: python3 .github/scripts/validate_skills.py

      - name: Install pytest
        run: python3 -m pip install --upgrade pytest jsonschema pyyaml

      - name: Install uv (test-pilot block-execution tests)
        uses: astral-sh/setup-uv@v5

      - name: Run plugin + band-eval tests
        # Single pytest process is safe: the four plugins merged into one superheroes
        # plugin lib tree (no shared module basenames), and eval/lib/identifiers.py was
        # removed, so the historical sys.path collision is resolved.
        run: |
          python3 -m pytest .github/scripts/tests/ plugins/superheroes/lib/tests/ plugins/superheroes/eval/tests/ eval/lib/tests/ -q

  pr-title:
    name: pr-title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: PR title is a Conventional Commit
        run: python3 .github/scripts/check_conventional_commit.py "$PR_TITLE"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
