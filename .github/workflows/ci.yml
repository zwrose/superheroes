name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate marketplace + plugin manifests
        run: python3 .github/scripts/validate_marketplace.py

      - name: Validate dual-host manifests + tool maps
        run: python3 .github/scripts/validate_hosts.py

      - name: Validate skill token-shape
        run: python3 .github/scripts/validate_skills.py

      - name: Install pytest
        run: python3 -m pip install --upgrade pytest jsonschema pyyaml

      - name: Install uv (test-pilot block-execution tests)
        uses: astral-sh/setup-uv@v5

      - name: Run plugin + band-eval tests
        # Each plugin's lib/ is put on sys.path by its tests/conftest.py, so plugins
        # that share a module basename (e.g. workhorse and test-pilot both have a
        # lock.py) would collide in a single shared pytest process. Plugins load in
        # isolation at runtime; mirror that by testing each suite in its own process.
        run: |
          fail=0
          for suite in \
            .github/scripts/tests/ \
            plugins/review-crew/lib/tests/ \
            plugins/review-crew/eval/tests/ \
            plugins/test-pilot/lib/tests/ \
            plugins/the-architect/lib/tests/ \
            plugins/workhorse/lib/tests/ \
            eval/lib/tests/; do
            echo "== pytest $suite =="
            python3 -m pytest "$suite" -q || fail=1
          done
          exit $fail
